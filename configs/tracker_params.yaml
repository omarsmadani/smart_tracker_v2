feature_extractor:
  model_path: "models/mobilenet_v2_quant_edgetpu.tflite"
  model_path_cpu: "models/mobilenet_v2_quant.tflite"
  input_size: 224
  feature_dim: 1001   # MobileNetV2 logits, L2-normalized as appearance embedding
  use_edgetpu: false

kalman:
  process_noise: 1.0
  measurement_noise: 1.0

template_search:
  scales: [0.7, 1.0, 1.4]
  top_k: 5
  match_method: "TM_CCOEFF_NORMED"
  nms_distance_ratio: 0.5

drift_check:
  interval_frames: 30
  min_cosine_drop: 0.15

state_machine:
  tau_reliable: 0.6
  tau_lost: 0.2
  tau_uncertain_write: 0.5
  k_confirm: 3
  n_lost_frames: 5
  t_max_lost: 150
  bbox_shrink_threshold: 0.4
  bbox_grow_threshold: 2.5
  bbox_check_window: 5

smart_memory:
  stm_size: 7
  ltm_size: 5
  ltm_min_confidence: 0.7

appearance_recovery:
  tau_reid: 0.6
  max_candidates: 20

visualization:
  tracking_color: [0, 255, 0]
  uncertain_color: [255, 255, 0]
  lost_color: [255, 0, 0]
  recovered_color: [0, 255, 255]
  log_path: "logs/tracking.csv"
