detector:
  model_path: "models/ssd_mobilenet_v2_coco_quant_postprocess_edgetpu.tflite"
  model_path_cpu: "models/ssd_mobilenet_v2_coco_quant_postprocess.tflite"
  labels_path: "models/coco_labels.txt"
  input_size: 300
  confidence_threshold: 0.5
  nms_iou_threshold: 0.45
  use_edgetpu: false

feature_extractor:
  model_path: "models/mobilenet_v2_quant_edgetpu.tflite"
  model_path_cpu: "models/mobilenet_v2_quant.tflite"
  input_size: 224
  feature_dim: 1001   # MobileNetV2 classification logits, L2-normalized as appearance embedding
  use_edgetpu: false

kalman:
  process_noise: 1.0
  measurement_noise: 1.0

data_association:
  min_iou_threshold: 0.3

state_machine:
  tau_reliable: 0.6
  tau_lost: 0.2
  tau_uncertain_write: 0.5
  k_confirm: 3
  n_lost_frames: 5
  t_max_lost: 150
  bbox_shrink_threshold: 0.4
  bbox_grow_threshold: 2.5
  bbox_check_window: 5

smart_memory:
  stm_size: 7
  ltm_size: 5
  ltm_min_confidence: 0.7

appearance_recovery:
  tau_reid: 0.6
  max_candidates: 20

visualization:
  tracking_color: [0, 255, 0]
  uncertain_color: [255, 255, 0]
  lost_color: [255, 0, 0]
  recovered_color: [0, 255, 255]
  show_all_detections: false
  log_path: "logs/tracking.csv"
